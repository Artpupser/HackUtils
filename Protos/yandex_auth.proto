syntax = "proto3";

package proto;

option go_package = "yandex_grpc_auth/proto;proto";

service YandexAuthService {
  rpc GetYandexAuthURL (Empty) returns (YandexAuthURLResponse);
  rpc ExchangeCode (YandexCodeRequest) returns (YandexUserResponse);
}

message Empty {
  
}

message YandexAuthURLResponse {
  string Url = 1; 
}
message YandexCodeRequest {
  string Code = 1;
 }
message YandexUserResponse {
   string Id = 1; 
   string Login = 2; 
   string Email = 3;
 
}