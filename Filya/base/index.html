<!DOCTYPE html>
<html lang="en"data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vite App</title>
</head>
<body>
 <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      🌙 Dark Mode
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card shadow">
      <div class="card-body">
        <h1>Темная карточка</h1>
      </div>
    </div>
  </div>
<section id="carousel" class="py-5">
  <div class="container">
    <h2 class="text-center mb-5">🎠 Карусель</h2>
    <div id="carouselExample" class="carousel slide shadow-lg mx-auto" style="max-width: 800px;" data-bs-ride="carousel">
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2"></button>
      </div>
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="https://via.placeholder.com/800x400/0d6efd/ffffff?text=Slide+1" class="d-block w-100 rounded" alt="Slide 1">
          <div class="carousel-caption d-none d-md-block">
            <h1>Первый слайд</h5>
            <p>Автозапуск + индикаторы</p>
          </div>
        </div>
        <div class="carousel-item">
          <img src="https://via.placeholder.com/800x400/ff6b6b/ffffff?text=Slide+2" class="d-block w-100 rounded" alt="Slide 2">
          <div class="carousel-caption d-none d-md-block">
            <h1>Второй слайд</h5>
            <p>Hover пауза + стрелки</p>
          </div>
        </div>
        <div class="carousel-item">
          <img src="" class="d-block w-100 rounded" alt="Slide 3">
          <div class="carousel-caption d-none d-md-block">
            <h1>Третий слайд</h5>
            <p>Полностью адаптивно</p>
          </div>
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </div>
</section>
<section id="cards" class="py-5 bg-dark">
  <div class="container">
    <h2 class="text-center mb-5">🃏 Карточки</h2>
    <div class="row g-4">
      <div class="col-lg-4 col-md-6">
        <div class="card h-100 shadow-sm border-0">
          <div class="card-body text-center p-4">
            <i class="bi bi-play-circle-fill display-4 text-primary mb-3"></i>
            <h5 class="card-title">Карусель</h5>
            <p class="card-text text-muted">Автопрокрутка, индикаторы, адаптивность</p>
            <div class="d-grid">
              <button class="btn btn-outline-primary btn-sm">Тест</button>
            </div>
          </div>
        </div>
      </div>
      <div class="col-lg-4 col-md-6">
        <div class="card h-100 shadow-sm border-0">
          <div class="card-body text-center p-4">
            <i class="bi bi-grid-3x3-gap-fill display-4 text-success mb-3"></i>
            <h5 class="card-title">Сетка</h5>
            <p class="card-text text-muted">12 колонок, все брейкпоинты</p>
            <div class="d-grid">
              <button class="btn btn-outline-success btn-sm">Тест</button>
            </div>
          </div>
        </div>
      </div>
      <div class="col-lg-4 col-md-6">
        <div class="card h-100 shadow-sm border-0">
          <div class="card-body text-center p-4">
            <i class="bi bi-check-circle-fill display-4 text-info mb-3"></i>
            <h5 class="card-title">Компоненты</h5>
            <p class="card-text text-muted">Navbar, Modal, Toast, Offcanvas</p>
            <div class="d-grid">
              <button class="btn btn-outline-info btn-sm">Тест</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
    <script type="module" src="/src/js/main.js"></script>
</body>
</html>
